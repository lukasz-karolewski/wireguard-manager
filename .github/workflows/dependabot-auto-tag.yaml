name: Dependabot auto-tag

on:
  pull_request:
    types: [closed]

permissions:
  contents: write

jobs:
  auto-tag:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' && github.event.pull_request.merged == true
    steps:
      - name: Check for pending Dependabot PRs
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PENDING=$(gh pr list --repo ${{ github.repository }} --author "app/dependabot" --state open --json number --jq 'length')
          echo "pending=$PENDING" >> $GITHUB_OUTPUT

      - name: Checkout
        if: steps.check.outputs.pending == '0'
        uses: actions/checkout@v6

      - name: Create version tag
        if: steps.check.outputs.pending == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="v$(date +'%y.%m.%d').${GITHUB_SHA::7}"
          git tag "$VERSION"
          git push origin "$VERSION"
