services:
  wireguard-migrations:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrator
    restart: "no"
    volumes:
      - ./db:/app/prisma/db
    environment:
      - DATABASE_URL=${DATABASE_URL-file:./db/prod.db}

  wireguard:
    image: lkarolewski/wg-manager:latest
    restart: unless-stopped
    depends_on:
      wireguard-migrations:
        condition: service_completed_successfully
    volumes:
      - /etc/wireguard:/etc/wireguard
      - ./db:/app/prisma/db
      - ~/.ssh:/home/node/.ssh:ro
    ports:
      - "8888:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL-file:./db/prod.db}
      - AUTH_SECRET=${AUTH_SECRET} # set to openssl rand -base64 32
      - AUTH_URL=${AUTH_URL} # update to external url, for example http://localhost:3000
      - GOOGLE_ID=${GOOGLE_ID}
      - GOOGLE_SECRET=${GOOGLE_SECRET}
